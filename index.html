<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Axolote Canvas App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FAVIcon -->
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon" />
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="./assets/CSS/styles.css">
    
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Axolote Canvas 2D</span>
        <span class="text-white">Desarrollado por Antonio Yañez</span>
    </div>
</nav>

<div class="container my-5">
    <div class="row">
        
        <!-- Canvas -->
        <div class="col-md-6 text-center">
            <h4>Dibujo por Programación</h4>
            <canvas id="canvas" width="600" height="400" class="shadow-lg"></canvas>
        </div>

        <!-- Imagen original -->
        <div class="col-md-6 text-center">
            <h4>Imagen Original</h4>
            <img src="./assets/img/ajolote2d.png" class="img-fluid shadow-lg" alt="Axolote original">
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">Aplicación desarrollada con API Canvas 2D | Programador: Antonio Yañez Hernandez | 2026</p>
</footer>

<script src="./assets/js/main.js"></script>
</body>
</html>
